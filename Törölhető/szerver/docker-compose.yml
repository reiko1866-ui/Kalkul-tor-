services:
  divian:
    build: .
    container_name: divian-kalkulator
    restart: unless-stopped
    ports:
      - "17321:17321"
    volumes:
      - divian-data:/data/divian
      - ./config/szerver.env:/app/config/szerver.env:ro
    environment:
      DIVIAN_SERVER_MODE: "1"
      DIVIAN_BIND_HOST: "0.0.0.0"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:17321/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  divian-data:

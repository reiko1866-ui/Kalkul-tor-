<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divian Export</title>
  </head>
  <body style="width: 260px; padding: 10px; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <div id="status" style="font-size: 12px; line-height: 1.35; color: #2b3632; margin-bottom: 10px">
      Betöltés...
    </div>

    <button
      id="btnTotal"
      style="width: 100%; height: 40px; background: green; color: white; border: none; cursor: pointer; margin-bottom: 8px"
    >
      EXCEL LETÖLTÉSE (összesített)
    </button>

    <button
      id="btnSnapshot"
      style="width: 100%; height: 34px; background: #3a4d58; color: white; border: none; cursor: pointer; margin-bottom: 8px"
    >
      Excel: utolsó pillanatkép
    </button>

    <button id="btnReset" style="width: 100%; height: 30px; border: 1px solid #cfd6cf; background: white; cursor: pointer">
      Lista törlése
    </button>

    <p style="font-size: 11px; color: #6e7d76; margin: 10px 0 0">
      Figyelő: automatikusan gyűjti az <code>item-lists</code> válaszokat, amíg a tervező nyitva van.
    </p>

    <script src="popup.js"></script>
  </body>
</html>
